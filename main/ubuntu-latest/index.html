pm\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-package-manager#cli' -o lgpm", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/logos-package-manager/2b4b72087154dd4d6f691ac2527e06e0dadaef4d' into the Git cache...\nthis path will be fetched (421.8 KiB download, 1.1 MiB unpacked):\n  /nix/store/fa3yzwgk55zfnb7jy608j55qlmxvagyb-logos-package-manager-cli-1.0.0\ncopying path '/nix/store/fa3yzwgk55zfnb7jy608j55qlmxvagyb-logos-package-manager-cli-1.0.0' from 'https://logos-co.cachix.org'...\n", "note": ""}]}, {"md": "### 4.3 Seed the modules directory with this capability module\n\nLoading any module goes through the host's capability layer, so the\nmodules directory needs the `capability_module` that ships with the\n`logoscore` we just built \u2014 i.e. the one built from this commit. Copy it\nacross first.\n\n```bash\nmkdir -p modules\ncp -RL ./logos/modules/. ./modules/\n\n```", "execs": [{"kind": "run", "cmd": "mkdir -p modules\ncp -RL ./logos/modules/. ./modules/\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.4 Install the greeter\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file greeter-lgx/*.lgx\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file greeter-lgx/*.lgx", "status": "pass", "exit_code": 0, "output": "Installing from file: greeter-lgx/logos-greeter_module-module-lib.lgx... done\nInstalled to: ./modules\n", "note": ""}]}, {"md": "### 4.5 Install the orchestrator\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file orchestrator-lgx/*.lgx\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules --allow-unsigned install --file orchestrator-lgx/*.lgx", "status": "pass", "exit_code": 0, "output": "Installing from file: orchestrator-lgx/logos-orchestrator_module-module-lib.lgx... done\nInstalled to: ./modules\n", "note": ""}]}, {"md": "### 4.6 Confirm all three modules are present\n\n```bash\n./lgpm/bin/lgpm --modules-dir ./modules list\n```", "execs": [{"kind": "run", "cmd": "./lgpm/bin/lgpm --modules-dir ./modules list", "status": "pass", "exit_code": 0, "output": "Found 3 installed module(s):\n\nNAME                           VERSION         TYPE       CATEGORY       \n----------------------------------------------------------------------\ncapability_module              1.0.0           core       security       \ngreeter_module                 1.0.0           core       general        \norchestrator_module            1.0.0           core       general        \n", "note": ""}]}, {"md": "## Step 5: Load both modules and drive the caller\n\nStart `logoscore` in daemon mode (`-D`) \u2014 it keeps each module's process\nalive between `call` commands, so an event subscription registered by one\ncall is still active when a later call triggers it, and an async reply\nlands before the call that reads it. The daemon auto-loads the\n`capability_module` (this commit) at boot; loading the two payload modules\nand every cross-module call below is then mediated by it.", "execs": []}, {"md": "### 5.1 Start the daemon\n\n```bash\nlogoscore -D -m ./modules > logs.txt &\n```", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore -D -m ./modules > logs.txt 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 5.2 Load the greeter (the dependency first)\n\n```bash\nlogoscore load-module greeter_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module greeter_module", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"greeter_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.3 Load the orchestrator\n\n```bash\nlogoscore load-module orchestrator_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module orchestrator_module", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"orchestrator_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.4 Confirm both report loaded\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":6790,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"orchestrator_module\",\"status\":\"loaded\"},{\"name\":\"greeter_module\",\"status\":\"loaded\"},{\"name\":\"capability_module\",\"status\":\"loaded\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":3,\"not_loaded\":0}}\n", "note": ""}]}, {"md": "### 5.5 Synchronous cross-module call\n\n`greetThrough(name)` forwards straight to `greeter_module.greet(name)`\nand returns the result \u2014 one typed sync call across the process\nboundary, authorised by the capability layer:\n\n```bash\nlogoscore call orchestrator_module greetThrough World\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call orchestrator_module greetThrough World", "status": "pass", "exit_code": 0, "output": "{\"method\":\"greetThrough\",\"module\":\"orchestrator_module\",\"result\":\"Hello, World!\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.6 Compose several calls into one result\n\n`greetReport(name, a, b)` fans out to three greeter calls \u2014 `greet`,\n`addInts`, and `greetCount` \u2014 and returns them as one map. The greeter\nhas now been greeted twice (once above, once here), so `greetCount` is\n`2`:\n\n```bash\nlogoscore call orchestrator_module greetReport Logos 3 5\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call orchestrator_module greetReport Logos 3 5", "status": "pass", "exit_code": 0, "output": "{\"method\":\"greetReport\",\"module\":\"orchestrator_module\",\"result\":{\"greetCount\":2,\"greeting\":\"Hello, Logos!\",\"sum\":8},\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.7 Asynchronous cross-module call\n\n`startAsyncGreet(name)` fires `greeter_module.greetAsync(name)` and\nreturns `\"queued\"` immediately. The reply arrives on the daemon's event\nloop; the next call, `asyncGreeting()`, reads what the callback stashed:\n\n```bash\nlogoscore call orchestrator_module startAsyncGreet Async\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call orchestrator_module startAsyncGreet Async", "status": "pass", "exit_code": 0, "output": "{\"method\":\"startAsyncGreet\",\"module\":\"orchestrator_module\",\"result\":\"queued\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 1\n```", "execs": [{"kind": "run", "cmd": "sleep 1", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 5.8 Read the async reply\n\n```bash\nlogoscore call orchestrator_module asyncGreeting\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call orchestrator_module asyncGreeting", "status": "pass", "exit_code": 0, "output": "{\"method\":\"asyncGreeting\",\"module\":\"orchestrator_module\",\"result\":\"Hello, Async!\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.9 Subscribe to the greeter's event\n\n`subscribeGreeted()` registers a typed callback on `greeter_module`'s\n`greeted` event. Then `greeter_module.greetNotify(...)` makes the\ngreeter emit it, and `lastGreetedEvent()` reads what the subscription\ncaptured. Because the daemon keeps both modules loaded, the event fires\nbetween the calls:\n\n```bash\nlogoscore call orchestrator_module subscribeGreeted\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call orchestrator_module subscribeGreeted", "status": "pass", "exit_code": 0, "output": "{\"method\":\"subscribeGreeted\",\"module\":\"orchestrator_module\",\"result\":\"ok\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.10 Trigger the event from the greeter\n\n```bash\nlogoscore call greeter_module greetNotify Events\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call greeter_module greetNotify Events", "status": "pass", "exit_code": 0, "output": "{\"method\":\"greetNotify\",\"module\":\"greeter_module\",\"result\":true,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 1\n```", "execs": [{"kind": "run", "cmd": "sleep 1", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 5.11 Read the captured event payload\n\n```bash\nlogoscore call orchestrator_module lastGreetedEvent\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call orchestrator_module lastGreetedEvent", "status": "pass", "exit_code": 0, "output": "{\"method\":\"lastGreetedEvent\",\"module\":\"orchestrator_module\",\"result\":\"Hello, Events!\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 5.12 Stop the daemon\n\n```bash\nlogoscore stop\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 5.13 Confirm the daemon has stopped\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status || true", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"instance_id\":\"459097c25ebf\",\"status\":\"not_running\",\"version\":\"1.0\"},\"modules\":[],\"rpc_error\":\"core_service not reachable\"}\n", "note": ""}]}, {"md": "## Recap\n\n| Composition path | In the orchestrator | Driven via `logoscore` |\n| ---------------- | ------------------- | ---------------------- |\n| Typed **sync** call | `greetThrough()` \u2192 `greeter.greet(...)` | `\"Hello, World!\"` |\n| Composed sync calls | `greetReport()` \u2192 `greet` + `addInts` + `greetCount` | one map of three results |\n| Typed **async** call | `startAsyncGreet()` \u2192 `greetAsync(..., cb)` | `queued`, then `\"Hello, Async!\"` |\n| Typed **event** subscription | `subscribeGreeted()` \u2192 `onGreeted(cb)` | captured `\"Hello, Events!\"` |\n\nEvery module load and every one of these calls was brokered by the\n`capability_module` built from the commit under test. A green run means this\ncapability-module change keeps module loading and inter-module composition \u2014\nexactly what the capability layer gates \u2014 working end to end, so the change\ndoes not break downstream consumers.", "execs": []}]}]}</script>
<script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
</body>
</html>
